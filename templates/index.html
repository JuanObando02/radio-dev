<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juan Obando | Radio Dev</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📻 Dashboard de Transmisión</h1>

        <audio id="radio-player" controls autoplay style="width:100%; margin-bottom: 20px;">
            <source src="{{ stream_url }}" type="audio/mpeg">
        </audio>
        <div class="now-playing-bar">
            <span class="now-playing-label">▶ Sonando ahora</span>
            <span class="now-playing-title" id="now-playing-title">—</span>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">🎧 Oyentes ahora</span>
                <span class="stat-value" id="listeners">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">📈 Pico máximo</span>
                <span class="stat-value" id="peak">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">🎵 Canciones</span>
                <span class="stat-value" id="total-songs">—</span>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat full-width">
                <span class="stat-label">📡 Inicio de stream</span>
                <span class="stat-value" id="stream-start">—</span>
            </div>
        </div>

        <!-- Cola de reproducción -->
        <p class="section-title">▶ Sonando y en cola</p>
        <div class="playlist-card" style="margin-bottom: 24px;">
            <div class="playlist-scroll" style="height: auto; max-height: 200px;">
                <div id="queue-content">
                    <p class="search-empty">Cargando cola...</p>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <p class="section-title" style="margin-top: 24px;">Buscar canción</p>
        <div class="search-card">
            <div class="search-header">
                <div class="search-input-wrap">
                    <input class="search-input" id="search-input" type="text"
                        placeholder="Escribe el nombre de la canción..." oninput="searchSongs(this.value)"
                        autocomplete="off">
                </div>
            </div>
            <div class="search-results" id="search-results">
                <p class="search-empty">Escribe para buscar canciones</p>
            </div>
        </div>

        <!-- Buscar en YouTube -->
        <p class="section-title" style="margin-top: 24px;">Buscar en YouTube</p>
        <div class="search-card">
            <div class="search-header">
                <div class="search-input-wrap">
                    <input class="search-input" id="yt-search-input" type="text"
                        placeholder="Buscar canción en YouTube..." autocomplete="off">
                    <button class="btn-next" onclick="searchYoutube()" style="padding: 8px 16px;">Buscar</button>
                </div>
            </div>
            <div class="search-results" id="yt-results">
                <p class="search-empty">Busca una canción para descargarla</p>
            </div>
        </div>

        <!-- Lista completa -->
        <p class="section-title">Todas las canciones</p>
        <div class="playlist-card">
            <div class="playlist-scroll" id="playlist-scroll">
                <div id="playlist-content">
                    <p style="padding: 20px; color: #555;">Cargando playlist...</p>
                </div>
            </div>
        </div>

    </div>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
