<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Juan Obando | Radio Dev</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📻 Dashboard de Transmisión</h1>

        <!-- Reproductor embebido opcional -->
        <audio id="radio-player" controls autoplay style="width:100%; margin-bottom: 20px;">
            <source src="https://stream.juanobando.dev/radio.mp3" type="audio/mpeg">
        </audio>
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">🎧 Oyentes ahora</span>
                <span class="stat-value" id="listeners">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">📈 Pico máximo</span>
                <span class="stat-value" id="peak">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">📡 Inicio de stream</span>
                <span class="stat-value" id="stream-start">—</span>
            </div>
        </div>
        <div class="playlist-card" id="playlist-content">
            <p style="padding: 20px;">Iniciando conexión...</p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>

</html>
