<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin | Radio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>
    <div class="container">
        <h1>⚙️ Admin Dashboard 
            <span class="logout" onclick="logout()">Cerrar sesión</span>
        </h1>

        <!-- Player & Control -->
        <div class="player-card">
            <div class="now-playing-bar">
                <span class="now-playing-label">▶ Sonando ahora</span>
                <span class="now-playing-title" id="now-playing-title">—</span>
            </div>
            
            <audio id="radio-player" controls autoplay style="width:100%; margin-bottom: 20px;">
                <source src="{{ stream_url }}" type="audio/mpeg">
            </audio>

            <button onclick="skipSong()" class="btn-warning">
                ⏭️ Saltar Canción Actual
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">🎵 Canciones</span>
                <span class="stat-value" id="total-songs">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">💾 Espacio usado</span>
                <span class="stat-value" id="disk-used">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">📀 Espacio libre</span>
                <span class="stat-value" id="disk-free">—</span>
            </div>
        </div>

        <!-- Upload -->
        <div class="upload-card">
            <h2>Subir canciones</h2>
            <div class="upload-area" id="upload-area" onclick="document.getElementById('upload-input').click()">
                <div style="font-size: 2rem;">🎵</div>
                <p>Haz clic o arrastra archivos MP3, M4A o WAV</p>
            </div>
            <input type="file" id="upload-input" multiple accept=".mp3,.m4a,.wav">
            <div class="progress" id="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="upload-status" id="upload-status"></div>
        </div>

        <!-- Songs list -->
        <h2>Todas las canciones</h2>
        <div class="songs-card">
            <div class="search-bar">
                <input type="text" placeholder="Filtrar canciones..." oninput="filterSongs(this.value)"
                    id="filter-input">
            </div>
            <div class="songs-scroll" id="songs-list">
                <div class="song-row"><span class="song-row-name" style="color:#666">Cargando...</span></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>

</html>
